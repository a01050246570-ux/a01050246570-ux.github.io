<!DOCTYPE html>
<html>
<head>
    <style>
        
        table {
            border-collapse: collapse; 
            width: 100%;
            font-family: arial, sans-serif;
            border: 1px solid black; 
        }

       
        th {
            background-color: black; 
            color: white; 
            text-align: left;
            padding: 8px;
            border: 1px solid black;
        }

       
        td {
            padding: 8px;
            text-align: left;
            border: 1px solid black;
        }

    
        tr:nth-child(even) {
            background-color: #dddddd;
        }

        .source {
            font-style: italic;
            font-family: serif;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Geographic Origin of Stanford Undergrads</h2>

    <table>
        <tr>
            <th>Geographic Origin</th>
            <th>Number of Students</th>
        </tr>
        <tr>
            <td>California</td>
            <td>2,943</td>
        </tr>
        <tr>
            <td>Other US</td>
            <td>3,447</td>
        </tr>
        <tr>
            <td>Asia</td>
            <td>264</td>
        </tr>
        <tr>
            <td>The Americas</td>
            <td>83</td>
        </tr>
        <tr>
            <td>Europe</td>
            <td>69</td>
        </tr>
        <tr>
            <td>Africa</td>
            <td>44</td>
        </tr>
        <tr>
            <td>Middle East and North Africa</td>
            <td>22</td>
        </tr>
        <tr>
            <td>Pacific Basin</td>
            <td>6</td>
        </tr>
    </table>

    <p class="source">Source: Stanford Facts Website</p>

</body>
</html>
